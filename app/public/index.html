<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>muoidv — Sample App</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>muoidv Sample App</h1>
    <p class="subtitle">Express + PostgreSQL — CI/CD lab demo</p>
  </header>

  <main>
    <section class="card">
      <h2>DB Connection Status</h2>
      <button id="btn-db-test">Check /api/db-test</button>
      <pre id="db-status">click button to check</pre>
    </section>

    <section class="card">
      <h2>Add Product</h2>
      <form id="form-add">
        <input type="text" id="input-name" placeholder="Product name" required />
        <input type="number" step="0.01" id="input-price" placeholder="Price" required />
        <button type="submit">Add</button>
      </form>
      <pre id="add-status"></pre>
    </section>

    <section class="card">
      <h2>Product List</h2>
      <button id="btn-refresh">Refresh</button>
      <table id="product-table">
        <thead>
          <tr><th>ID</th><th>Name</th><th>Price</th><th>Created</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <footer>
    <p>muoidv CI/CD lab — version <span id="app-version">1.0.0</span></p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
